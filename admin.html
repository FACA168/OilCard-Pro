<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理员登录</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

<h2>后台管理系统</h2>

<input
type="text"
id="username"
placeholder="管理员账号">

<input
type="password"
id="password"
placeholder="管理员密码">

<button id="loginBtn">

登录后台

</button>

</div>

<script>

document
.getElementById("loginBtn")
.onclick=function(){

const user=
document
.getElementById("username")
.value
.trim();

const pass=
document
.getElementById("password")
.value
.trim();

// 演示版登录
if(user==="admin" && pass==="123456"){

location.href="dashboard.html";

}else{

alert("账号或密码错误");

}

}

</script>

</body>
</html>
