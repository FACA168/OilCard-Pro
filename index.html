<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>OilCard Pro</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- 顶部 -->

<header class="header">

<div class="logo">

<img src="images/logo.png">

<span>OilCard Pro</span>

</div>

<div class="service">

在线客服

</div>

</header>

<!-- Banner -->

<div class="banner">

<img src="images/banner.jpg">

</div>

<!-- 公告 -->

<div class="notice">

<marquee>

🎉 欢迎使用 OilCard Pro 加油卡充值平台，电子代金券限时领取。

</marquee>

</div>

<!-- 手机号码 -->

<div class="card">

<h3>领取电子代金券</h3>

<input
type="tel"
id="mobile"
placeholder="请输入手机号码">

<button id="receiveBtn">

立即领取

</button>

</div>

<!-- 代金券 -->

<div
class="coupon"
id="couponBox">

<div class="title">

电子代金券

</div>

<div class="couponCode"
id="couponCode">

---------

</div>

<div class="status">

状态：

<span id="couponStatus">

等待激活

</span>

</div>

<button id="submitStaff">

提交工作人员激活

</button>

</div>

<!-- 充值 -->

<div class="card recharge">

<h3>

充值金额

</h3>

<div class="moneyList">

<button class="money">

100元

</button>

<button class="money">

200元

</button>

<button class="money">

300元

</button>

<button class="money">

500元

</button>

<button class="money">

1000元

</button>

</div>

<button
class="payBtn">

立即充值

</button>

</div>

<footer>

Copyright © 2026

OilCard Pro

</footer>

<script src="js/api.js"></script>
<script src="js/script.js"></script>

</body>

</html>
