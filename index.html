<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>OilCard Pro</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- 顶部 -->

<header class="header">

<div class="logo">

<img src="images/logo.png" alt="Logo">

<span>OilCard Pro</span>

</div>

<div class="service"
onclick="location.href='service.html'">

在线客服

</div>

</header>

<!-- Banner -->

<section class="banner">

<img src="images/banner.jpg"
alt="Banner">

</section>

<!-- 公告 -->

<div class="notice">

<marquee scrollamount="4">

🎉 欢迎使用 OilCard Pro，首次注册即可领取电子代金券。

</marquee>

</div>

<!-- 手机号码 -->

<div class="card">

<h2>

领取电子代金券

</h2>

<input
type="tel"
id="mobile"
maxlength="11"
placeholder="请输入11位手机号码">

<button
id="receiveBtn">

立即领取

</button>

</div>

<!-- 电子券 -->

<div
class="coupon"
id="couponBox">

<h3>

电子代金券

</h3>

<div
class="coupon-number"
id="couponCode">

---------

</div>

<div
class="coupon-status">

状态：

<span
id="couponStatus">

未领取

</span>

</div>

<button
id="nextBtn"
style="display:none;">

下一步

</button>

</div>

<!-- 功能入口 -->

<div class="card">

<h3>

快捷功能

</h3>

<div class="grid">

<div class="item">

订单查询

</div>

<div class="item">

充值记录

</div>

<div class="item">

联系客服

</div>

<div class="item">

帮助中心

</div>

</div>

</div>

<footer>

Copyright © 2026

OilCard Pro

</footer>

<script src="js/api.js"></script>

<script>


  // ==============================
// OilCard Pro 首页 V4.0
// ==============================

const mobile=document.getElementById("mobile");
const receiveBtn=document.getElementById("receiveBtn");
const nextBtn=document.getElementById("nextBtn");

const couponCode=document.getElementById("couponCode");
const couponStatus=document.getElementById("couponStatus");

// 页面初始化
window.onload=function(){

    const phone=localStorage.getItem("mobile");
    const code=localStorage.getItem("couponCode");

    if(phone){

        mobile.value=phone;

    }

    if(code){

        couponCode.innerHTML=code;

        couponStatus.innerHTML="已领取";

        couponStatus.style.color="#18a058";

        receiveBtn.style.display="none";

        nextBtn.style.display="block";

    }

}

// 生成电子券编号
function createCoupon(){

    const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

    let code="OC-";

    for(let i=0;i<10;i++){

        code+=chars[
            Math.floor(
                Math.random()*chars.length
            )
        ];

    }

    return code;

}

// 点击领取
receiveBtn.onclick=function(){

    const phone=mobile.value.trim();

    if(phone.length!=11){

        alert("请输入11位手机号码");

        return;

    }

    // 已领取，不重新生成
    let code=localStorage.getItem("couponCode");

    if(!code){

        code=createCoupon();

        localStorage.setItem(
            "couponCode",
            code
        );

    }

    localStorage.setItem(
        "mobile",
        phone
    );

    couponCode.innerHTML=code;

    couponStatus.innerHTML="已领取";

    couponStatus.style.color="#18a058";

    receiveBtn.style.display="none";

    nextBtn.style.display="block";

    alert("电子代金券领取成功！");

}

// 下一步
nextBtn.onclick=function(){

    location.href="order.html";

}

  // 恢复按钮状态
if(localStorage.getItem("couponCode")){

    receiveBtn.disabled=true;

    receiveBtn.innerHTML="已领取";

}

// 回车领取
mobile.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        if(receiveBtn.style.display!="none"){

            receiveBtn.click();

        }

    }

});

</script>

</body>

</html>
