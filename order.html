<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>订单详情</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="admin-header">

<h2>订单详情</h2>

<button onclick="history.back()">

返回

</button>

</header>

<div class="card">

<div class="row">

<span>订单号</span>

<b id="orderNo">

OD202607130001

</b>

</div>

<div class="row">

<span>手机号</span>

<b id="phone">

138****8000

</b>

</div>

<div class="row">

<span>订单金额</span>

<b id="money">

￥200.00

</b>

</div>

<div class="row">

<span>订单状态</span>

<select id="status">

<option>待处理</option>

<option>处理中</option>

<option>已完成</option>

<option>已取消</option>

</select>

</div>

<div class="row">

<span>创建时间</span>

<b>

2026-07-13 10:00:00

</b>

</div>

<div class="row">

<span>备注</span>

<textarea
id="remark"
placeholder="填写备注">

</textarea>

</div>

<button id="saveBtn">

保存修改

</button>

</div>

<script>

document
.getElementById("saveBtn")
.onclick=function(){

alert("演示版：订单修改成功。");

}

</script>

</body>

</html>
