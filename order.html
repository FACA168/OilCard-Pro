<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>填写订单</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="header">

<div class="logo">

<img src="images/logo.png" alt="Logo">

<span>OilCard Pro</span>

</div>

</header>

<div class="card">

<h2>

订单信息

</h2>

<label>

手机号码

</label>

<input
id="phone"
type="text"
readonly>

<label>

电子代金券

</label>

<input
id="coupon"
type="text"
readonly>

<label>

联系人

</label>

<input
id="username"
type="text"
placeholder="请输入联系人姓名">

<label>

订单金额

</label>

<select id="money">

<option value="">请选择金额</option>

<option value="100">100 元</option>

<option value="200">200 元</option>

<option value="300">300 元</option>

<option value="500">500 元</option>

<option value="1000">1000 元</option>

</select>

<button id="submitBtn">

提交订单

</button>

</div>

<script src="js/api.js"></script>

<script>

  // ==============================
// Order 页面
// ==============================

const phone=document.getElementById("phone");
const coupon=document.getElementById("coupon");
const username=document.getElementById("username");
const money=document.getElementById("money");
const submitBtn=document.getElementById("submitBtn");

// 自动读取首页数据
window.onload=function(){

    phone.value=localStorage.getItem("mobile")||"";

    coupon.value=localStorage.getItem("couponCode")||"";

    if(phone.value===""||coupon.value===""){

        alert("请先领取电子代金券");

        location.href="index.html";

        return;

    }

}

// 提交订单
submitBtn.onclick=function(){

    if(username.value.trim()==""){

        alert("请输入联系人姓名");

        return;

    }

    if(money.value==""){

        alert("请选择订单金额");

        return;

    }

    // 生成订单号
    const orderNo="OD"+Date.now();

    // 订单对象
    const order={

        orderNo:orderNo,

        phone:phone.value,

        coupon:coupon.value,

        username:username.value,

        money:money.value,

        status:"待处理",

        createTime:new Date().toLocaleString()

    };

    // 保存订单
    let orders=JSON.parse(localStorage.getItem("orders")||"[]");

    orders.unshift(order);

    localStorage.setItem("orders",JSON.stringify(orders));

    // 保存当前订单号
    localStorage.setItem("currentOrder",orderNo);

    // 跳转订单详情
    location.href="query.html";

}

  // 防止重复提交
submitBtn.disabled = false;

submitBtn.addEventListener("click",function(){

    submitBtn.disabled = true;

    submitBtn.innerHTML = "提交中...";

    setTimeout(function(){

        submitBtn.disabled = false;

        submitBtn.innerHTML = "提交订单";

    },1000);

});

</script>

</body>

</html>
