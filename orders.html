<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>订单管理</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<header class="admin-header">

<h2>

订单管理

</h2>

<button onclick="location.href='dashboard.html'">

返回后台

</button>

</header>

<div class="card">

<h3>

订单查询

</h3>

<div class="search-box">

<input
id="keyword"
type="text"
placeholder="输入订单号、手机号或联系人">

<button
id="searchBtn">

查询

</button>

<button
id="refreshBtn">

刷新

</button>

</div>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>

订单号

</th>

<th>

联系人

</th>

<th>

手机号

</th>

<th>

金额

</th>

<th>

状态

</th>

<th>

创建时间

</th>

<th>

操作

</th>

</tr>

</thead>

<tbody id="orderTable">

</tbody>

</table>

</div>

<script>

  // ==============================
// 订单管理
// ==============================

const table=document.getElementById("orderTable");
const keyword=document.getElementById("keyword");
const searchBtn=document.getElementById("searchBtn");
const refreshBtn=document.getElementById("refreshBtn");

// 获取订单
function getOrders(){

    return JSON.parse(
        localStorage.getItem("orders") || "[]"
    );

}

// 状态颜色
function statusClass(status){

    switch(status){

        case "待处理":
            return "status-pending";

        case "处理中":
            return "status-processing";

        case "已完成":
            return "status-success";

        case "已取消":
            return "status-cancel";

        default:
            return "";

    }

}

// 加载订单
function loadOrders(list){

    table.innerHTML="";

    if(list.length===0){

        table.innerHTML=`
<tr>
<td colspan="7">
暂无订单
</td>
</tr>
`;

        return;

    }

    list.forEach(function(item){

        table.innerHTML += `
<tr>

<td>${item.orderNo}</td>

<td>${item.username}</td>

<td>${item.phone}</td>

<td>￥${item.money}</td>

<td class="${statusClass(item.status)}">
${item.status}
</td>

<td>${item.createTime}</td>

<td>

<button
class="btn-view"
onclick="viewOrder('${item.orderNo}')">

查看

</button>

</td>

</tr>
`;

    });

}

// 查询
searchBtn.onclick=function(){

    const key=keyword.value.trim();

    const list=getOrders().filter(function(item){

        return item.orderNo.includes(key)

        || item.phone.includes(key)

        || item.username.includes(key);

    });

    loadOrders(list);

}

// 刷新
refreshBtn.onclick=function(){

    keyword.value="";

    loadOrders(getOrders());

}

  // 查看订单
function viewOrder(orderNo){

    localStorage.setItem(
        "currentOrder",
        orderNo
    );

    location.href="order.html";

}

// 删除订单（预留）
function deleteOrder(orderNo){

    if(!confirm("确定删除该订单吗？")){

        return;

    }

    let list=getOrders();

    list=list.filter(function(item){

        return item.orderNo!==orderNo;

    });

    localStorage.setItem(
        "orders",
        JSON.stringify(list)
    );

    loadOrders(list);

}

// 页面初始化
window.onload=function(){

    loadOrders(getOrders());

}

// 回车搜索
keyword.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        searchBtn.click();

    }

});

</script>

<script src="js/api.js"></script>
<script src="js/admin.js"></script>

</body>

</html>
