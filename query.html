<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>订单查询</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="header">

<div class="logo">

<img src="images/logo.png" alt="Logo">

<span>OilCard Pro</span>

</div>

</header>

<div class="card">

<h2>

订单提交成功

</h2>

<label>订单号</label>

<input
id="orderNo"
type="text"
readonly>

<label>联系人</label>

<input
id="username"
type="text"
readonly>

<label>手机号码</label>

<input
id="phone"
type="text"
readonly>

<label>电子代金券</label>

<input
id="coupon"
type="text"
readonly>

<label>订单金额</label>

<input
id="money"
type="text"
readonly>

<label>订单状态</label>

<input
id="status"
type="text"
readonly>

<button id="refreshBtn">

刷新订单状态

</button>

<button
onclick="location.href='index.html'">

返回首页

</button>

</div>

<script>

  // ==============================
// 订单查询页面
// ==============================

const orderNo=document.getElementById("orderNo");
const username=document.getElementById("username");
const phone=document.getElementById("phone");
const coupon=document.getElementById("coupon");
const money=document.getElementById("money");
const status=document.getElementById("status");

const refreshBtn=document.getElementById("refreshBtn");

// 加载订单
function loadOrder(){

    const currentOrder=
        localStorage.getItem("currentOrder");

    if(!currentOrder){

        alert("没有找到订单");

        location.href="index.html";

        return;

    }

    const orders=
        JSON.parse(
            localStorage.getItem("orders")||"[]"
        );

    const order=
        orders.find(function(item){

            return item.orderNo===currentOrder;

        });

    if(!order){

        alert("订单不存在");

        location.href="index.html";

        return;

    }

    orderNo.value=order.orderNo;

    username.value=order.username;

    phone.value=order.phone;

    coupon.value=order.coupon;

    money.value="￥"+order.money;

    status.value=order.status;

}

// 页面加载
window.onload=function(){

    loadOrder();

}

// 刷新状态
refreshBtn.onclick=function(){

    loadOrder();

    alert("订单状态已刷新");

}

</script>

</body>

</html>
