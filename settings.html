<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>系统设置</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="admin.css">
</head>

<body>

<header class="admin-header">
    <h2>系统设置</h2>
    <button onclick="location.href='dashboard.html'">返回后台</button>
</header>

<div class="card">

<h3>网站信息</h3>

<p>网站名称</p>
<input id="siteName" type="text" value="OilCard Pro">

<p style="margin-top:15px;">客服邮箱</p>
<input id="serviceEmail" type="email" placeholder="service@example.com">

<p style="margin-top:15px;">联系电话</p>
<input id="servicePhone" type="text" placeholder="请输入联系电话">

<button id="saveBtn" style="margin-top:20px;">
保存设置
</button>

</div>

<script>

const saveBtn=document.getElementById("saveBtn");

saveBtn.onclick=function(){

const data={

siteName:document.getElementById("siteName").value,

serviceEmail:document.getElementById("serviceEmail").value,

servicePhone:document.getElementById("servicePhone").value

};

localStorage.setItem(
"siteSetting",
JSON.stringify(data)
);

alert("设置已保存");

}

window.onload=function(){

const data=JSON.parse(
localStorage.getItem("siteSetting")
);

if(data){

document.getElementById("siteName").value=data.siteName||"";

document.getElementById("serviceEmail").value=data.serviceEmail||"";

document.getElementById("servicePhone").value=data.servicePhone||"";

}

}

</script>

</body>
</html>
